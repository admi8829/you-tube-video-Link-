# Continuous Integration (Release Build Pipeline) for React Native Android
name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Global environment variables to customize paths and folder configuration
env:
  # CHANGE THIS: Set this to the sub-folder name containing your package.json (e.g., mobile, src, app)
  WORKING_DIRECTORY: mobile

jobs:
  build-android:
    name: Build Android APK (React Native Release)
    runs-on: ubuntu-latest

    # Sets defaults to run all script commands automatically in the sub-folder
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Safely configure dependency caching only when a lockfile is actually found in the WORKING_DIRECTORY environment path
          cache: ${{ (hashFiles(format('{0}/package-lock.json', env.WORKING_DIRECTORY)) != '' && 'npm') || (hashFiles(format('{0}/yarn.lock', env.WORKING_DIRECTORY)) != '' && 'yarn') || '' }}
          cache-dependency-path: |
            ${{ env.WORKING_DIRECTORY }}/package-lock.json
            ${{ env.WORKING_DIRECTORY }}/yarn.lock

      - name: Install Node.js Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Verify TypeScript & Code Standards
        run: |
          npm run ts:check --if-present
          npm run lint --if-present

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Hashing target file paths correctly mapped inside subcollection paths
          key: ${{ runner.os }}-gradle-${{ hashFiles(format('{0}/android/**/*.gradle*', env.WORKING_DIRECTORY), format('{0}/android/gradle-wrapper.properties', env.WORKING_DIRECTORY)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ${{ env.WORKING_DIRECTORY }}/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReframe-Android-Release-APK
          path: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            ${{ env.WORKING_DIRECTORY }}/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 14
