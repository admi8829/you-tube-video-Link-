# Continuous Integration (Release Build Pipeline) for React Native Android
name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build Android APK (React Native Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect React Native Project Directory
        id: detect
        run: |
          # Dynamically search for the folder holding package.json with react-native dependencies
          DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | while read -r file; do
            dir=$(dirname "$file")
            if grep -q '"react-native"' "$file"; then
              echo "$dir"
              break
            fi
          done)
          
          # Fallback to look for any package.json if no specific react-native config is present
          if [ -z "$DIR" ]; then
            DIR=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1 | xargs dirname 2>/dev/null || echo ".")
          fi
          
          # Clean ./ path prefix if present
          DIR=$(echo "$DIR" | sed 's|^\./||')
          
          if [ -z "$DIR" ] || [ "$DIR" = "." ]; then
            echo "dir=" >> $GITHUB_OUTPUT
            echo "Detected React Native at repository root."
          else
            echo "dir=$DIR" >> $GITHUB_OUTPUT
            echo "Detected React Native at sub-directory: $DIR"
          fi

      - name: Set up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Safely configure dependency caching only when a lockfile is actually found in the detected workspace
          cache: ${{ (hashFiles(format('{0}/package-lock.json', steps.detect.outputs.dir || '.')) != '' && 'npm') || (hashFiles(format('{0}/yarn.lock', steps.detect.outputs.dir || '.')) != '' && 'yarn') || '' }}
          cache-dependency-path: |
            ${{ steps.detect.outputs.dir || '.' }}/package-lock.json
            ${{ steps.detect.outputs.dir || '.' }}/yarn.lock

      - name: Install Node.js Dependencies
        working-directory: ${{ steps.detect.outputs.dir || '.' }}
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          elif [ -f "yarn.lock" ]; then
            yarn install --frozen-lockfile
          else
            npm install
          fi

      - name: Verify TypeScript & Code Standards
        working-directory: ${{ steps.detect.outputs.dir || '.' }}
        run: |
          npm run ts:check --if-present
          npm run lint --if-present

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Hashing target file paths correctly mapped inside detected subdirectory path
          key: ${{ runner.os }}-gradle-${{ hashFiles(format('{0}/android/**/*.gradle*', steps.detect.outputs.dir || '.'), format('{0}/android/gradle-wrapper.properties', steps.detect.outputs.dir || '.')) }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle Wrapper Executable
        working-directory: ${{ steps.detect.outputs.dir || '.' }}
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: ${{ steps.detect.outputs.dir || '.' }}/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ${{ steps.detect.outputs.dir || '.' }}/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReframe-Android-Release-APK
          path: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            ${{ steps.detect.outputs.dir || '.' }}/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 14
