# Continuous Integration (Release Build Pipeline) for Android
name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build Android APK (Flutter Release & Verification)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Flutter Analyzer & Formatting Verification
        run: |
          flutter analyze --no-fatal-warnings
          flutter format --set-exit-if-changed . || true

      - name: Build Release APK
        run: flutter build apk --release

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: build/app/outputs/flutter-apk
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReframe-Android-Release-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile || 'build/app/outputs/flutter-apk/app-release.apk' }}
          if-no-files-found: warn
          retention-days: 14
